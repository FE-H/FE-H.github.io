<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Ho Fook Eng</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #121212;
      font-family: Arial, sans-serif;
      color: #f0f0f0;
    }
    .card {
      background-color: #1e1e1e;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      text-align: left;
      max-width: 500px;
    }
    .card h1 {
      margin: 0;
      font-size: 2em;
      color: #ffffff;
      text-align: center;
    }
    .label {
      font-weight: bold;
      color: #66ccff;
      margin-top: 15px;
    }
    .skills {
      margin: 10px 0;
    }
    .skills span {
      display: inline-block;
      background-color: #2a2a2a;
      color: #f0f0f0;
      padding: 6px 12px;
      margin: 5px 5px 0 0;
      border-radius: 6px;
      font-size: 0.9em;
    }
    .fact {
      font-style: italic;
      color: #aaaaaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ho Fook Eng</h1>
    <div class="label">Role:</div>
    <p>Digital Customer Transformation</p>
    <div class="label">Expertise / Skills:</div>
    <div class="skills">
      <span>SAP IS-U</span>
      <span>SAP CRM</span>
      <span>SAP PI</span>
      <span>Enterprise Architecture</span>
      <span>Project Management</span>
    </div>
    <div class="label">Interesting Fact:</div>
    <p class="fact">I like to code in C++, but I have never developed professionally.</p>
  </div>
</body>
</html>
